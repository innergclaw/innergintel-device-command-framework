ecosystem: InnerG Intel Command OS
version: 0.2.0
updated: 2026-05-16

lanes:
  ownyourweb:
    label: OWNYOURWEB
    role: Website Business Operations
    accent: gold
    intake_source:
      primary: live_site_form
      url: https://ownyourweb.xyz/
      form_name: Project Request
      memory_route: website intake memory -> build queue -> project board
      manual_dashboard_entry: fallback_only
    owns:
      - website orders
      - project request forms
      - client project boards
      - launch checklists
      - domain and hosting notes
      - delivery updates
    forms:
      - website intake
      - revision request
      - launch approval
    project_statuses:
      - capture
      - review
      - quote
      - build
      - verify
      - deploy
      - handoff

  shopnasgfx:
    label: SHOPNASGFX
    role: Creative Design Operations
    accent: red
    intake_source:
      primary: live_site_form
      url: https://shopnasgfx.com/
      form_name: Book Now / Contact
      memory_route: design intake memory -> asset queue -> project board
      manual_dashboard_entry: fallback_only
    owns:
      - design orders
      - creative briefs
      - asset collection
      - draft approvals
      - revision rounds
      - final delivery
    forms:
      - design brief
      - asset upload
      - revision request
      - approval
    project_statuses:
      - capture
      - assets needed
      - draft
      - revision
      - approved
      - delivered

  innergintel:
    label: INNERGINTEL
    role: System Project Management
    accent: blue
    intake_source:
      primary: dashboard_or_ops_capture
      url: internal
      form_name: System Update
      memory_route: system memory -> project/date/class board -> ops update
      manual_dashboard_entry: allowed
    owns:
      - project management
      - important details
      - dates
      - classes
      - ecosystem updates
      - skills and automation notes
    forms:
      - system update
      - class note
      - project brief
      - ops report
    project_statuses:
      - capture
      - plan
      - build
      - verify
      - log
      - notify

  personal:
    label: PERSONAL
    role: Private Life Operations
    accent: green
    intake_source:
      primary: private_manual_capture
      url: internal
      form_name: Private Note
      memory_route: private memory -> human review -> reminder/action
      manual_dashboard_entry: allowed
    owns:
      - life admin
      - family notes
      - private reminders
      - appointments
      - investment watchlists
      - bills and personal finance notes
    forms:
      - private note
      - family reminder
      - investment watch
      - life admin task
    project_statuses:
      - capture
      - review
      - do
      - waiting
      - done

shared_objects:
  - contact
  - intake
  - order
  - project
  - task
  - date
  - file
  - update
  - approval

intake_memory_rules:
  ownyourweb:
    source_of_truth: live OWNYOURWEB Project Request form
    dashboard_role: review and project management
    normal_first_status: capture
    next_status: review
  shopnasgfx:
    source_of_truth: live SHOPNASGFX Book Now / Contact flow
    dashboard_role: review and design project management
    normal_first_status: capture
    next_status: assets needed
  manual_dashboard_intake:
    allowed_for:
      - INNERGINTEL
      - PERSONAL
      - Telegram captures
      - corrected form submissions
      - form downtime fallback

security_rules:
  public_dashboard:
    show:
      - lane
      - status
      - category
      - non-sensitive title
      - next action
    avoid:
      - credentials
      - payment details
      - private family details
      - full investment account details
      - legal or medical details
  human_approval_required:
    - financial transactions
    - investment trades
    - payment links
    - DNS changes
    - public launch announcements
    - client-facing commitments
