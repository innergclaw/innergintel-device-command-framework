<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paid Client Intake</title>
  <meta http-equiv="refresh" content="0; url=dashboard/">
  <meta name="description" content="Paid client intake form for OWNYOURWEB and SHOPNASGFX.">
  <style>
    :root {
      color-scheme: dark;
      --gold: #f5b51b;
      --text: #f7f4ec;
      --muted: #ada79a;
    }

    * { box-sizing: border-box; }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #050505;
    }

    main {
      width: min(680px, calc(100% - 28px));
      border: 2px solid var(--gold);
      padding: 28px;
      background: #080808;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: .86;
      text-transform: uppercase;
    }

    p { color: var(--muted); line-height: 1.6; }
    a { color: var(--gold); font-weight: 900; text-transform: uppercase; }
  </style>
</head>
<body>
  <main>
    <h1>Paid Client Intake</h1>
    <p>Opening the intake form.</p>
    <p><a href="dashboard/">Open Form</a></p>
  </main>
</body>
</html>
